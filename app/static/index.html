<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Coach</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

      :root {
        --bg: #edf3ee;
        --panel: #f8fbf8;
        --line: #c9d7ce;
        --text: #1f2f27;
        --muted: #607468;
        --user: #dff1ea;
        --assistant: #ffffff;
        --accent: #0e7a67;
        --accent-2: #ea580c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 10% 10%, rgba(14, 122, 103, 0.13), transparent 38%),
          radial-gradient(circle at 92% 8%, rgba(234, 88, 12, 0.1), transparent 35%),
          var(--bg);
        color: var(--text);
        font-family: 'Manrope', sans-serif;
        min-height: 100vh;
        padding: 16px;
      }

      .app {
        height: calc(100vh - 32px);
        max-width: 1060px;
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(248, 251, 248, 0.92);
        box-shadow: 0 20px 50px rgba(29, 46, 38, 0.12);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .topbar {
        border-bottom: 1px solid var(--line);
        padding: 16px 20px;
        background: linear-gradient(90deg, rgba(14, 122, 103, 0.08), rgba(234, 88, 12, 0.06));
      }

      .topbar h1 {
        margin: 0;
        font-size: 1.18rem;
      }

      .topbar p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .chat {
        flex: 1;
        overflow-y: auto;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .row {
        display: flex;
      }

      .row.user {
        justify-content: flex-end;
      }

      .row.assistant {
        justify-content: flex-start;
      }

      .bubble {
        width: min(860px, 100%);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--assistant);
        padding: 12px 14px;
      }

      .row.user .bubble {
        width: auto;
        max-width: min(700px, 86%);
        background: var(--user);
      }

      .bubble.coach {
        background: #f9fcfa;
      }

      .small {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 0.86rem;
      }

      .option-stack {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .option {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        background: #fff;
      }

      .option h3 {
        margin: 0 0 6px;
        font-size: 0.96rem;
      }

      .option p {
        margin: 0;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.84rem;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .pick-row {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: var(--text);
        padding: 8px 13px;
        font-family: 'Manrope', sans-serif;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        border-color: transparent;
        background: var(--accent);
        color: #fff;
      }

      button.secondary {
        border-color: transparent;
        background: var(--accent-2);
        color: #fff;
      }

      button:disabled {
        opacity: 0.62;
        cursor: not-allowed;
      }

      .answer-tag {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 0.84rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .answer-body {
        font-size: 0.96rem;
        line-height: 1.6;
      }

      .answer-body p,
      .answer-body ul,
      .answer-body ol,
      .answer-body h1,
      .answer-body h2,
      .answer-body h3 {
        margin: 0 0 10px;
      }

      .answer-body ul,
      .answer-body ol {
        padding-left: 22px;
      }

      .answer-body a {
        color: var(--accent);
      }

      .typing {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
      }

      .dots {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #98ab9f;
        animation: blink 1s infinite ease-in-out;
      }

      .dots span:nth-child(2) {
        animation-delay: 0.15s;
      }

      .dots span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes blink {
        0%,
        80%,
        100% {
          opacity: 0.25;
        }
        40% {
          opacity: 1;
        }
      }

      .composer {
        border-top: 1px solid var(--line);
        padding: 12px 14px 14px;
        background: var(--panel);
      }

      .composer-grid {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: end;
      }

      textarea {
        width: 100%;
        min-height: 60px;
        max-height: 170px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 11px;
        font-family: 'Manrope', sans-serif;
        font-size: 1rem;
        background: #fff;
      }

      .composer-actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .status {
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.86rem;
      }

      @media (max-width: 760px) {
        .composer-grid {
          grid-template-columns: 1fr;
        }

        .composer-actions {
          flex-direction: row;
        }

        .row.user .bubble,
        .bubble {
          max-width: 100%;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <h1>Prompt Coach</h1>
        <p>What do you want to ask ChatGPT?</p>
      </header>

      <main id="chat" class="chat"></main>

      <div class="composer">
        <div class="composer-grid">
          <textarea id="messageInput" placeholder="What do you want to ask ChatGPT?"></textarea>
          <div class="composer-actions">
            <button id="abBtn" class="primary" type="button">A/B</button>
            <button id="directBtn" class="secondary" type="button">Direct</button>
          </div>
        </div>
        <div id="status" class="status">What do you want to ask ChatGPT?</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script>
      const chatEl = document.getElementById('chat');
      const messageInput = document.getElementById('messageInput');
      const abBtn = document.getElementById('abBtn');
      const directBtn = document.getElementById('directBtn');
      const statusEl = document.getElementById('status');

      function escapeHTML(value) {
        return String(value || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function markdownToHtml(text) {
        const src = text || '';
        if (!window.marked) {
          return `<p>${escapeHTML(src).replaceAll('\n', '<br>')}</p>`;
        }
        const parsed = window.marked.parse(src, { gfm: true, breaks: true });
        let safe = parsed;
        if (window.DOMPurify) {
          safe = window.DOMPurify.sanitize(parsed);
        }
        const template = document.createElement('template');
        template.innerHTML = safe;
        template.content.querySelectorAll('a[href]').forEach((anchor) => {
          anchor.setAttribute('target', '_blank');
          anchor.setAttribute('rel', 'noopener noreferrer');
        });
        return template.innerHTML;
      }

      function forceExternalLinksToNewTab(scope = document) {
        scope.querySelectorAll('a[href]').forEach((anchor) => {
          anchor.setAttribute('target', '_blank');
          anchor.setAttribute('rel', 'noopener noreferrer');
        });
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function setComposerBusy(isBusy, statusText) {
        abBtn.disabled = isBusy;
        directBtn.disabled = isBusy;
        messageInput.disabled = isBusy;
        setStatus(statusText);
      }

      function createRow(role) {
        const row = document.createElement('div');
        row.className = `row ${role}`;

        const bubble = document.createElement('div');
        bubble.className = 'bubble';

        row.appendChild(bubble);
        chatEl.appendChild(row);
        chatEl.scrollTop = chatEl.scrollHeight;
        return bubble;
      }

      function addUserMessage(text) {
        const bubble = createRow('user');
        bubble.textContent = text;
      }

      function addTypingMessage(label) {
        const bubble = createRow('assistant');
        bubble.innerHTML = `
          <div class="typing">
            <span>${escapeHTML(label)}</span>
            <span class="dots"><span></span><span></span><span></span></span>
          </div>
        `;
        return bubble;
      }

      function renderClarifierOptions(bubble, data, originalMessage) {
        bubble.classList.add('coach');
        bubble.innerHTML = `
          <p class="small">Version A and Version B are ready. Do you want Answer A, Answer B, or both?</p>
          <div class="option-stack">
            <div class="option">
              <h3>Option A</h3>
              <p>${escapeHTML(data.prompt_a_clarified)}</p>
            </div>
            <div class="option">
              <h3>Option B</h3>
              <p>${escapeHTML(data.prompt_b_vision)}</p>
            </div>
          </div>
          <div class="pick-row">
            <button type="button" data-choice="A">Answer A</button>
            <button type="button" data-choice="B" class="secondary">Answer B</button>
            <button type="button" data-choice="A,B" class="primary">Answer Both</button>
          </div>
        `;

        const actionButtons = bubble.querySelectorAll('button[data-choice]');
        actionButtons.forEach((button) => {
          button.addEventListener('click', async () => {
            const selected = button.dataset.choice.split(',');
            await runOptionAnswer(selected, originalMessage, data, actionButtons);
          });
        });
      }

      async function runOptionAnswer(selected, originalMessage, data, actionButtons) {
        actionButtons.forEach((button) => {
          button.disabled = true;
        });

        setStatus(`Generating answer ${selected.join('+')}...`);
        const typingBubble = addTypingMessage(`Generating answer ${selected.join('+')}...`);

        try {
          const response = await fetch('/v1/execute', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              original_message: originalMessage,
              selected,
              prompt_a_clarified: data.prompt_a_clarified,
              prompt_b_vision: data.prompt_b_vision,
            }),
          });

          if (!response.ok) {
            const errorText = await response.text();
            typingBubble.innerHTML = `<p class="small">Execution failed: ${escapeHTML(errorText)}</p>`;
            setStatus('Execution failed.');
            return;
          }

          const payload = await response.json();
          typingBubble.parentElement.remove();

          payload.runs.forEach((run) => {
            const answerBubble = createRow('assistant');
            answerBubble.innerHTML = `
              <p class="answer-tag">Answer ${escapeHTML(run.variant)}</p>
              <div class="answer-body">${markdownToHtml(run.answer)}</div>
            `;
          });

          setStatus(`Answer ${selected.join('+')} ready.`);
        } finally {
          actionButtons.forEach((button) => {
            button.disabled = false;
          });
        }
      }

      async function runAB() {
        const message = messageInput.value.trim();
        if (!message) {
          setStatus('Please enter a prompt.');
          return;
        }

        addUserMessage(message);
        messageInput.value = '';

        const typingBubble = addTypingMessage('Creating options A and B...');
        setComposerBusy(true, 'Creating options A/B...');

        try {
          const response = await fetch('/v1/clarify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message, locale: 'en-US' }),
          });

          if (!response.ok) {
            const errorText = await response.text();
            typingBubble.innerHTML = `<p class="small">A/B failed: ${escapeHTML(errorText)}</p>`;
            setStatus('A/B failed.');
            return;
          }

          const data = await response.json();
          renderClarifierOptions(typingBubble, data, message);
          setStatus('A/B ready. Choose A, B, or both.');
        } finally {
          setComposerBusy(false, 'Ready.');
        }
      }

      async function runDirect() {
        const message = messageInput.value.trim();
        if (!message) {
          setStatus('Please enter a prompt.');
          return;
        }

        addUserMessage(message);
        messageInput.value = '';

        const typingBubble = addTypingMessage('Thinking...');
        setComposerBusy(true, 'GPT is replying...');

        try {
          const response = await fetch('/v1/direct', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message }),
          });

          if (!response.ok) {
            const errorText = await response.text();
            typingBubble.innerHTML = `<p class="small">Direct failed: ${escapeHTML(errorText)}</p>`;
            setStatus('Direct failed.');
            return;
          }

          const data = await response.json();
          typingBubble.innerHTML = `
            <p class="answer-tag">Direct Answer</p>
            <div class="answer-body">${markdownToHtml(data.answer)}</div>
          `;
          setStatus('Direct answer ready.');
        } finally {
          setComposerBusy(false, 'Ready.');
        }
      }

      messageInput.addEventListener('keydown', (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') {
          event.preventDefault();
          runAB();
        }
      });

      abBtn.addEventListener('click', runAB);
      directBtn.addEventListener('click', runDirect);

      document.addEventListener('click', (event) => {
        const link = event.target.closest('a[href]');
        if (!link) {
          return;
        }
        const href = link.getAttribute('href') || '';
        if (href.startsWith('http://') || href.startsWith('https://')) {
          link.setAttribute('target', '_blank');
          link.setAttribute('rel', 'noopener noreferrer');
        }
      });

      forceExternalLinksToNewTab(document);
    </script>
  </body>
</html>
